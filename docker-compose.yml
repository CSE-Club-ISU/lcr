services:
  spacetimedb:
    image: clockworklabs/spacetimedb:latest
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
    environment:
      - SPACETIMEDB_ALLOWED_OIDC_ISSUER=http://auth:4000
    restart: unless-stopped
    depends_on:
      - auth

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - PORT=4000
    restart: unless-stopped

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - spacetimedb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - spacetimedb
      - auth
    restart: unless-stopped

volumes:
  spacetimedb_data:
