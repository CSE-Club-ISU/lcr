services:
  init:
    build:
      context: .
      dockerfile: init.Dockerfile
    entrypoint: ["/bin/bash", "/init.sh"]
    command: []
    volumes:
      - .:/workspace
      - ./init.sh:/init.sh
      - spacetime_config:/root/.config/spacetime
    depends_on:
      spacetimedb:
        condition: service_started

  spacetimedb:
    image: clockworklabs/spacetime:latest
    command: start
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
    restart: unless-stopped

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - PORT=4000
      - SPACETIMEDB_URL=http://spacetimedb:3000
      - STORE_FILE=/data/token-store.json
    volumes:
      - auth_data:/data
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spacetime_config:/spacetime_config:ro
    environment:
      - SPACETIMEDB_TOKEN_FILE=/spacetime_config/executor_token
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      init:
        condition: service_completed_successfully
      auth:
        condition: service_started
    restart: unless-stopped

  cpp-runner:
    build:
      context: ./executor
      dockerfile: Dockerfile.cpp
    image: lcr-cpp-runner:latest
    # This service exists only to build the image; it never runs.
    profiles: [build]

volumes:
  spacetimedb_data:
  auth_data:
  spacetime_config:   # must be wiped together with spacetimedb_data
