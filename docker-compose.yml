services:
  spacetimedb:
    image: clockworklabs/spacetime:latest
    command: start
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
    restart: unless-stopped

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - PORT=4000
      - SPACETIMEDB_URL=http://spacetimedb:3000
      - STORE_FILE=/data/token-store.json
    volumes:
      - auth_data:/data
    depends_on:
      - spacetimedb
    restart: unless-stopped

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - spacetimedb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - spacetimedb
      - auth
    restart: unless-stopped

volumes:
  spacetimedb_data:
  auth_data:
